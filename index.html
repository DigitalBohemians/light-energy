<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Light & Energy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --gold-dim: #8a6a28;
      --cream: #f7f0e3;
      --deep: #0a0806;
    }
    html, body {
      height: 100%; background: var(--deep); color: var(--cream);
      font-family: 'Cormorant Garamond', serif;
      overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .view { position: fixed; inset: 0; transition: opacity 0.8s ease; }
    .view.hidden { opacity: 0; pointer-events: none; }

    /* ══ AFFIRMATION VIEW ══ */
    #view-affirmation { z-index: 10; }

    .bg { position: absolute; inset: 0; }
    .bg-gradient {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 30%,
        rgba(100,60,10,.55) 0%, rgba(20,12,4,.9) 60%, var(--deep) 100%);
    }
    .bg-noise {
      position: absolute; inset: 0; opacity: .04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
    .orb-wrap { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .orb {
      width: min(70vw,70vh); height: min(70vw,70vh); border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, rgba(255,220,100,.22) 0%, rgba(201,168,76,.10) 35%, rgba(120,80,20,.04) 65%, transparent 80%);
      box-shadow: 0 0 80px 40px rgba(201,168,76,.08), 0 0 160px 80px rgba(180,120,20,.05);
      animation: orbPulse 6s ease-in-out infinite;
    }
    @keyframes orbPulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.08);opacity:1} }

    .rays-svg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .rays-svg svg { width:min(100vw,100vh); height:min(100vw,100vh); opacity:.07; animation:raysSpin 60s linear infinite; }
    @keyframes raysSpin { to{transform:rotate(360deg)} }

    #aff-canvas { position:absolute; inset:0; }

    .corner { position:absolute; width:40px; height:40px; opacity:.25; }
    .corner svg { width:100%; height:100%; }
    .corner.tl{top:1.5rem;left:1.5rem}
    .corner.tr{top:1.5rem;right:1.5rem;transform:scaleX(-1)}
    .corner.bl{bottom:3rem;left:1.5rem;transform:scaleY(-1)}
    .corner.br{bottom:3rem;right:1.5rem;transform:scale(-1)}

    .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .eyebrow {
      font-family:'Cinzel',serif; font-size:clamp(.55rem,1.8vw,.75rem);
      font-weight:300; letter-spacing:.35em; color:var(--gold-dim);
      text-transform:uppercase; margin-bottom:2.5rem;
      opacity:0; animation:fadeUp 1.8s ease .3s forwards;
    }
    .divider {
      width:1px; height:48px;
      background:linear-gradient(to bottom,transparent,var(--gold-dim),transparent);
      margin:0 auto 2.5rem; opacity:0; animation:fadeUp 1.8s ease .5s forwards;
    }
    .affirmation-box { max-width:min(680px,90vw); min-height:8rem; display:flex; align-items:center; justify-content:center; }
    #affirmation {
      font-weight:300; font-style:italic; font-size:clamp(1.4rem,4.5vw,2.4rem);
      line-height:1.55; color:var(--cream); letter-spacing:.01em;
      transition:opacity 1.2s ease, transform 1.2s ease;
    }
    #affirmation.fade-out  { opacity:0; transform:translateY(-12px); }
    #affirmation.fade-in   { opacity:1; transform:translateY(0); }
    #affirmation.hidden    { opacity:0; transform:translateY(12px); }
    .divider2 { width:1px; height:48px; background:linear-gradient(to bottom,transparent,var(--gold-dim),transparent); margin:2.5rem auto 2rem; opacity:0; animation:fadeUp 1.8s ease .7s forwards; }

    .btn-row { display:flex; gap:1rem; align-items:center; opacity:0; animation:fadeUp 1.8s ease 1s forwards; flex-wrap:wrap; justify-content:center; }
    .tap-btn {
      background:none; border:1px solid rgba(201,168,76,.35); color:var(--gold);
      font-family:'Cinzel',serif; font-size:clamp(.55rem,1.8vw,.72rem); font-weight:300;
      letter-spacing:.3em; text-transform:uppercase; padding:.9rem 2.4rem;
      cursor:pointer; transition:background .4s,border-color .4s,color .4s;
    }
    .tap-btn:hover,.tap-btn:active { background:rgba(201,168,76,.1); border-color:var(--gold); color:var(--gold-light); }
    .ar-btn {
      background:none; border:1px solid rgba(201,168,76,.35); color:var(--gold);
      font-family:'Cinzel',serif; font-size:clamp(.55rem,1.8vw,.72rem); font-weight:300;
      letter-spacing:.2em; text-transform:uppercase; padding:.9rem 1.4rem;
      cursor:pointer; transition:background .4s,border-color .4s,color .4s;
      display:flex; align-items:center; gap:.6rem;
    }
    .ar-btn:hover,.ar-btn:active { background:rgba(201,168,76,.1); border-color:var(--gold); color:var(--gold-light); }
    .ar-btn svg { width:18px; height:18px; flex-shrink:0; }

    .footer {
      position:absolute; bottom:env(safe-area-inset-bottom,1.5rem); left:0; right:0;
      text-align:center; font-family:'Cinzel',serif; font-size:clamp(.45rem,1.4vw,.6rem);
      letter-spacing:.25em; color:rgba(201,168,76,.2); text-transform:uppercase; padding-bottom:1.2rem;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    /* ══ AR VIEW ══ */
    #view-ar { z-index: 20; background: #000; }

    #ar-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    #ar-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    .ar-frame { position:absolute; inset:0; pointer-events:none; }
    .ar-frame svg { width:100%; height:100%; }

    .ar-ui {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 2rem 1.5rem;
      padding-top: max(2rem, env(safe-area-inset-top));
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
    }
    .ar-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .ar-label { font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.3em; color:rgba(201,168,76,.7); text-transform:uppercase; }
    .ar-close-btn {
      pointer-events:all;
      background:rgba(0,0,0,.4); border:1px solid rgba(201,168,76,.4);
      color:var(--gold); font-family:'Cinzel',serif; font-size:.6rem;
      letter-spacing:.25em; text-transform:uppercase; padding:.6rem 1.2rem;
      cursor:pointer; backdrop-filter:blur(6px); transition:background .3s;
    }
    .ar-close-btn:hover { background:rgba(201,168,76,.15); }
    .ar-bottom { display:flex; flex-direction:column; align-items:center; gap:1.2rem; }
    .ar-hint { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:clamp(.9rem,3vw,1.1rem); color:rgba(247,240,227,.5); letter-spacing:.05em; text-align:center; }
    .ar-back-btn {
      pointer-events: all;
      background: rgba(0,0,0,.5); border: 1px solid rgba(201,168,76,.5);
      color: var(--gold); font-family:'Cinzel',serif; font-size:.65rem;
      letter-spacing:.25em; text-transform:uppercase; padding:.8rem 2rem;
      cursor:pointer; backdrop-filter:blur(8px); transition:background .3s, border-color .3s;
      display:flex; align-items:center; gap:.6rem;
    }
    .ar-back-btn:hover,.ar-back-btn:active { background:rgba(201,168,76,.15); border-color:var(--gold); }

    #ar-permission {
      position:absolute; inset:0; background:rgba(0,0,0,.92);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:1.5rem; padding:2rem; text-align:center; z-index:5;
    }
    #ar-permission.gone { display:none; }
    .perm-icon { opacity:.6; }
    .perm-title { font-family:'Cinzel',serif; font-size:1rem; letter-spacing:.2em; color:var(--gold); }
    .perm-text { font-size:1rem; color:rgba(247,240,227,.6); line-height:1.6; max-width:280px; }
    .perm-btn {
      background:none; border:1px solid var(--gold); color:var(--gold);
      font-family:'Cinzel',serif; font-size:.65rem; letter-spacing:.3em;
      text-transform:uppercase; padding:.9rem 2.4rem; cursor:pointer; transition:background .3s;
    }
    .perm-btn:hover { background:rgba(201,168,76,.1); }
    .perm-back {
      background:none; border:none; color:rgba(201,168,76,.45);
      font-family:'Cinzel',serif; font-size:.6rem; letter-spacing:.25em;
      text-transform:uppercase; cursor:pointer; padding:.4rem 1rem;
      transition:color .3s;
    }
    .perm-back:hover { color:var(--gold); }
    .perm-err { color:rgba(255,120,80,.8); font-size:.85rem; display:none; }
  </style>
</head>
<body>

<!-- AFFIRMATION VIEW -->
<div class="view" id="view-affirmation">
  <div class="bg">
    <div class="bg-gradient"></div>
    <div class="bg-noise"></div>
    <div class="orb-wrap"><div class="orb"></div></div>
    <div class="rays-svg"><svg id="rays-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"><g id="rays-g" transform="translate(200,200)"></g></svg></div>
    <canvas id="aff-canvas"></canvas>
  </div>

  <div class="corner tl"><svg viewBox="0 0 40 40" fill="none"><path d="M2 38L2 2L38 2" stroke="#c9a84c" stroke-width=".8"/><path d="M2 12L12 2" stroke="#c9a84c" stroke-width=".5" opacity=".5"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 40 40" fill="none"><path d="M2 38L2 2L38 2" stroke="#c9a84c" stroke-width=".8"/><path d="M2 12L12 2" stroke="#c9a84c" stroke-width=".5" opacity=".5"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 40 40" fill="none"><path d="M2 38L2 2L38 2" stroke="#c9a84c" stroke-width=".8"/><path d="M2 12L12 2" stroke="#c9a84c" stroke-width=".5" opacity=".5"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 40 40" fill="none"><path d="M2 38L2 2L38 2" stroke="#c9a84c" stroke-width=".8"/><path d="M2 12L12 2" stroke="#c9a84c" stroke-width=".5" opacity=".5"/></svg></div>

  <div class="stage">
    <p class="eyebrow">A message from the light</p>
    <div class="divider"></div>
    <div class="affirmation-box">
      <p id="affirmation" class="hidden"></p>
    </div>
    <div class="divider2"></div>
    <div class="btn-row">
      <button class="tap-btn" onclick="nextAffirmation()">Receive Another</button>
      <button class="ar-btn" onclick="openAR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 8V6a2 2 0 0 1 2-2h2"/><path d="M16 4h2a2 2 0 0 1 2 2v2"/>
          <path d="M4 16v2a2 2 0 0 0 2 2h2"/><path d="M16 20h2a2 2 0 0 0 2-2v-2"/>
          <circle cx="12" cy="12" r="3" opacity=".6"/>
          <path d="M12 5v2M12 17v2M5 12h2M17 12h2" opacity=".4"/>
        </svg>
        See the Light
      </button>
    </div>
  </div>
  <div class="footer">Light &amp; Energy &nbsp;·&nbsp; Touch &amp; Receive</div>
</div>


<!-- AR VIEW -->
<div class="view hidden" id="view-ar">
  <video id="ar-video" autoplay playsinline muted></video>
  <canvas id="ar-canvas"></canvas>

  <div class="ar-frame">
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 18L5 5L18 5"  stroke="rgba(201,168,76,0.45)" stroke-width=".35" fill="none"/>
      <path d="M82 5L95 5L95 18" stroke="rgba(201,168,76,0.45)" stroke-width=".35" fill="none"/>
      <path d="M5 82L5 95L18 95" stroke="rgba(201,168,76,0.45)" stroke-width=".35" fill="none"/>
      <path d="M95 82L95 95L82 95" stroke="rgba(201,168,76,0.45)" stroke-width=".35" fill="none"/>
      <circle cx="50" cy="50" r="5" stroke="rgba(201,168,76,0.2)" stroke-width=".25" fill="none"/>
      <line x1="50" y1="44" x2="50" y2="41" stroke="rgba(201,168,76,0.2)" stroke-width=".2"/>
      <line x1="50" y1="56" x2="50" y2="59" stroke="rgba(201,168,76,0.2)" stroke-width=".2"/>
      <line x1="44" y1="50" x2="41" y2="50" stroke="rgba(201,168,76,0.2)" stroke-width=".2"/>
      <line x1="56" y1="50" x2="59" y2="50" stroke="rgba(201,168,76,0.2)" stroke-width=".2"/>
    </svg>
  </div>

  <div id="ar-permission">
    <div class="perm-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="rgba(201,168,76,.8)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <p class="perm-title">Open the Vision</p>
    <p class="perm-text">Allow camera access to see light and energy flowing around the sculpture.</p>
    <button class="perm-btn" onclick="startCamera()">Allow Camera</button>
    <button class="perm-back" onclick="closeAR()">← Back</button>
    <p class="perm-err" id="perm-err">Camera access was denied. Please allow it in your browser settings.</p>
  </div>

  <div class="ar-ui">
    <div class="ar-top">
      <span class="ar-label">Light Vision</span>
      <button class="ar-close-btn" onclick="closeAR()">✕ &nbsp;Close</button>
    </div>
    <div class="ar-bottom">
      <p class="ar-hint">Point toward the sculpture</p>
      <button class="ar-back-btn" onclick="closeAR()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        Back to Affirmations
      </button>
    </div>
  </div>
</div>


<script>
/* ══ AFFIRMATIONS ══ */
const affirmations = [
  "You are made of the same energy that ignites the stars.",
  "Light moves through you — you are never separate from it.",
  "Every breath you take is the universe knowing itself.",
  "You carry within you an ancient, unbreakable radiance.",
  "You are allowed to take up space, to shine, to expand.",
  "The energy that created worlds also created you.",
  "You are a convergence of light that has always been.",
  "Your presence alone changes the frequency of a room.",
  "You are worthy — not because of what you do, but because you exist.",
  "There is a stillness at your core that nothing can disturb.",
  "You are not separate from the sacred. You are the sacred.",
  "Your light does not compete — it simply illuminates.",
  "Everything you need is already alive within you.",
  "You are held by something far greater than fear.",
  "Let yourself be moved. Let yourself be light.",
  "The universe has never made anything quite like you.",
  "You are energy in its most beautiful, conscious form.",
  "In this moment, you are exactly where you are meant to be.",
  "Your softness is not weakness. It is how light enters.",
  "You are the beginning and the returning — always whole.",
];
let lastAffIdx = -1;
function getRandom() {
  let i; do { i = Math.floor(Math.random() * affirmations.length); } while (i === lastAffIdx);
  lastAffIdx = i; return affirmations[i];
}
function nextAffirmation() {
  const el = document.getElementById('affirmation');
  const text = getRandom();
  if (el.classList.contains('hidden')) {
    el.textContent = text; el.classList.remove('hidden');
    requestAnimationFrame(() => el.classList.add('fade-in'));
  } else {
    el.classList.add('fade-out');
    setTimeout(() => {
      el.textContent = text; el.classList.remove('fade-out','fade-in');
      void el.offsetWidth; el.classList.add('fade-in');
    }, 1200);
  }
}
setTimeout(nextAffirmation, 1600);

/* Rays */
const rg = document.getElementById('rays-g');
for (let i = 0; i < 24; i++) {
  const l = document.createElementNS('http://www.w3.org/2000/svg','line');
  l.setAttribute('x1','0'); l.setAttribute('y1','0');
  l.setAttribute('x2','0'); l.setAttribute('y2','-195');
  l.setAttribute('stroke','#c9a84c');
  l.setAttribute('stroke-width', i%3===0?'1.5':'0.7');
  l.setAttribute('transform',`rotate(${(360/24)*i})`);
  rg.appendChild(l);
}

/* Affirmation bg particles */
(function(){
  const canvas = document.getElementById('aff-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize', resize); resize();
  function mkP(){
    const cx=W/2, cy=H*.42, sp=Math.min(W,H)*.22;
    return { x:cx+(Math.random()-.5)*sp*2, y:cy+(Math.random()-.5)*sp,
      r:Math.random()*1.6+.3, speed:Math.random()*.4+.1, alpha:0,
      maxAlpha:Math.random()*.7+.2, life:0, maxLife:Math.random()*300+150,
      dx:(Math.random()-.5)*.3 };
  }
  for(let i=0;i<60;i++){const p=mkP();p.life=Math.random()*p.maxLife;pts.push(p);}
  function loop(){
    ctx.clearRect(0,0,W,H);
    pts.forEach((p,i)=>{
      p.life++; p.x+=p.dx; p.y-=p.speed;
      const t=p.life/p.maxLife;
      p.alpha=t<.15?(t/.15)*p.maxAlpha:t>.75?((1-t)/.25)*p.maxAlpha:p.maxAlpha;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(240,208,128,${p.alpha})`; ctx.fill();
      if(p.life>=p.maxLife) pts[i]=mkP();
    });
    requestAnimationFrame(loop);
  }
  loop();
})();


/* ══ AR MODE ══ */
let arStream = null;
let arAnimId = null;

function openAR() {
  document.getElementById('view-affirmation').classList.add('hidden');
  document.getElementById('view-ar').classList.remove('hidden');
}

function closeAR() {
  document.getElementById('view-ar').classList.add('hidden');
  document.getElementById('view-affirmation').classList.remove('hidden');
  if (arStream) { arStream.getTracks().forEach(t => t.stop()); arStream = null; }
  if (arAnimId) { cancelAnimationFrame(arAnimId); arAnimId = null; }
}

async function startCamera() {
  document.getElementById('perm-err').style.display = 'none';
  const attempts = [
    { video: { facingMode: { ideal: 'environment' }, width:{ideal:1920}, height:{ideal:1080} }, audio: false },
    { video: { facingMode: 'user' }, audio: false },
    { video: true, audio: false },
  ];
  for (const c of attempts) {
    try {
      arStream = await navigator.mediaDevices.getUserMedia(c);
      const video = document.getElementById('ar-video');
      video.srcObject = arStream;
      await video.play();
      document.getElementById('ar-permission').classList.add('gone');
      initARCanvas();
      return;
    } catch(e) { /* try next */ }
  }
  const err = document.getElementById('perm-err');
  err.textContent = 'Camera access was denied. Please allow it in your browser settings.';
  err.style.display = 'block';
}

function initARCanvas() {
  const canvas = document.getElementById('ar-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resize); resize();

  const G  = (a) => `rgba(201,168,76,${a})`;
  const WH = (a) => `rgba(255,240,200,${a})`;

  /* ── Floating particles ── */
  const particles = [];
  function mkParticle() {
    const spread = Math.random();
    const x = spread < .7
      ? W*.5 + (Math.random()-.5)*W*.55
      : Math.random()*W;
    const y = spread < .7
      ? H*.55 + (Math.random()-.5)*H*.45
      : Math.random()*H;
    return {
      x, y,
      r: Math.random()*2.2+.4,
      vy: -(Math.random()*.5+.08),
      vx: (Math.random()-.5)*.2,
      life: 0,
      maxLife: Math.random()*440+180,
      maxAlpha: Math.random()*.75+.12,
      alpha: 0,
      star: Math.random() < .22,
      twinkle: Math.random()*Math.PI*2,
    };
  }
  for (let i=0;i<100;i++){const p=mkParticle();p.life=Math.random()*p.maxLife;particles.push(p);}

  /* ── Pulsing rings ── */
  const rings = [];
  function mkRing() {
    return {
      x: W*.3 + Math.random()*W*.4,
      y: H*.25 + Math.random()*H*.45,
      r: 0,
      targetR: Math.random()*Math.min(W,H)*.2 + 28,
      speed: Math.random()*.35+.12,
      alpha: 0,
      phase: 'grow',
      holdT: 0,
      maxHold: Math.random()*90+40,
      thick: Math.random()*1.1+.3,
    };
  }
  for(let i=0;i<7;i++){const r=mkRing();r.r=r.targetR*Math.random()*.9;rings.push(r);}

  /* ── Light streaks ── */
  const streaks = [];
  function mkStreak() {
    const angle = Math.random()*Math.PI*2;
    return {
      cx: W*.28+Math.random()*W*.44,
      cy: H*.22+Math.random()*H*.54,
      angle,
      len: Math.random()*130+35,
      life: 0,
      maxLife: Math.random()*200+70,
      maxAlpha: Math.random()*.5+.08,
      alpha: 0,
      width: Math.random()*1.4+.25,
      drift: (Math.random()-.5)*.003,
    };
  }
  for(let i=0;i<14;i++){const s=mkStreak();s.life=Math.random()*s.maxLife;streaks.push(s);}

  function drawStar(x, y, r, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = G(1);
    ctx.lineWidth = .5;
    ctx.shadowBlur = 8;
    ctx.shadowColor = G(.6);
    ctx.translate(x, y);
    for(let i=0;i<4;i++){
      ctx.beginPath(); ctx.moveTo(0,-r*1.7); ctx.lineTo(0,r*1.7); ctx.stroke();
      ctx.rotate(Math.PI/4);
    }
    ctx.restore();
  }

  function loop() {
    if (canvas.offsetWidth !== W || canvas.offsetHeight !== H) resize();
    ctx.clearRect(0, 0, W, H);

    /* Rings */
    rings.forEach((rr, i) => {
      if (rr.phase === 'grow') {
        rr.r += rr.speed;
        rr.alpha = Math.min(rr.alpha + .010, .52);
        if (rr.r >= rr.targetR) rr.phase = 'hold';
      } else if (rr.phase === 'hold') {
        rr.holdT++;
        if (rr.holdT >= rr.maxHold) rr.phase = 'fade';
      } else {
        rr.alpha -= .005;
        rr.r += rr.speed * .35;
        if (rr.alpha <= 0) rings[i] = mkRing();
      }
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = G(.35);
      ctx.beginPath();
      ctx.arc(rr.x, rr.y, rr.r, 0, Math.PI*2);
      ctx.strokeStyle = G(rr.alpha);
      ctx.lineWidth = rr.thick * 1.8;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(rr.x, rr.y, rr.r*1.05, 0, Math.PI*2);
      ctx.strokeStyle = WH(rr.alpha * .28);
      ctx.lineWidth = rr.thick * .5;
      ctx.stroke();
      ctx.restore();
    });

    /* Streaks */
    streaks.forEach((s, i) => {
      s.life++; s.angle += s.drift;
      const tt = s.life / s.maxLife;
      s.alpha = tt < .15 ? (tt/.15)*s.maxAlpha
              : tt > .7  ? ((1-tt)/.3)*s.maxAlpha
              : s.maxAlpha;
      const cos=Math.cos(s.angle), sin=Math.sin(s.angle);
      const x1=s.cx-cos*(s.len/2), y1=s.cy-sin*(s.len/2);
      const x2=s.cx+cos*(s.len/2), y2=s.cy+sin*(s.len/2);
      const grad = ctx.createLinearGradient(x1,y1,x2,y2);
      grad.addColorStop(0,   G(0));
      grad.addColorStop(.2,  G(s.alpha));
      grad.addColorStop(.5,  WH(s.alpha*.75));
      grad.addColorStop(.8,  G(s.alpha));
      grad.addColorStop(1,   G(0));
      ctx.save();
      ctx.shadowBlur = 14;
      ctx.shadowColor = G(.4);
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width*2.2;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
      if (s.life >= s.maxLife) streaks[i] = mkStreak();
    });

    /* Particles */
    particles.forEach((p, i) => {
      p.life++; p.x+=p.vx; p.y+=p.vy;
      p.twinkle += .035;
      const tr = p.life/p.maxLife;
      p.alpha = tr<.12?(tr/.12)*p.maxAlpha : tr>.78?((1-tr)/.22)*p.maxAlpha : p.maxAlpha;
      const ta = p.alpha * (.7 + .3*Math.sin(p.twinkle));
      if (p.star && p.r > 1.2) {
        drawStar(p.x, p.y, p.r*.7, ta*.85);
      } else {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = G(.5);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = G(ta);
        ctx.fill();
        if (p.r > 1.3) {
          ctx.beginPath();
          ctx.arc(p.x-.3, p.y-.3, p.r*.3, 0, Math.PI*2);
          ctx.fillStyle = WH(ta*.55);
          ctx.fill();
        }
        ctx.restore();
      }
      if (p.life >= p.maxLife || p.y < -20) particles[i] = mkParticle();
    });

    arAnimId = requestAnimationFrame(loop);
  }
  loop();
}
</script>
</body>
</html>
