<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Light & Energy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #7eb8f7;
      --gold-light: #b8d9ff;
      --gold-dim: #4a7ab5;
      --cream: #e8f0ff;
      --deep: #03080f;
    }
    html, body {
      height: 100%; background: var(--deep); color: var(--cream);
      font-family: 'Inter', sans-serif;
      overflow: hidden; -webkit-tap-highlight-color: transparent; user-select: none;
    }

    .view { position: fixed; inset: 0; transition: opacity 0.8s ease; }
    .view.hidden { opacity: 0; pointer-events: none; }

    /* ══ AFFIRMATION VIEW ══ */
    #view-affirmation { z-index: 10; }

    .bg { position: absolute; inset: 0; }
    .bg-gradient {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 30%,
        rgba(10,40,90,.65) 0%, rgba(4,12,28,.92) 60%, var(--deep) 100%);
    }
    .warm-glow {
      position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 45% 35% at 50% 48%,
        rgba(255, 200, 100, 0.055) 0%,
        rgba(255, 180, 80, 0.02) 40%,
        transparent 70%);
    }
    .bg-noise {
      position: absolute; inset: 0; opacity: .04;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }
    .orb-wrap { position: absolute; inset: 0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .orb {
      width: min(70vw,70vh); height: min(70vw,70vh); border-radius: 50%;
      background: radial-gradient(circle at 48% 48%,
        rgba(255,220,140,.08) 0%,
        rgba(180,210,255,.14) 20%,
        rgba(60,120,220,.08) 50%,
        rgba(20,60,140,.03) 70%,
        transparent 85%);
      box-shadow: 0 0 60px 30px rgba(255,200,100,.04), 0 0 120px 60px rgba(60,120,255,.07), 0 0 200px 100px rgba(40,80,200,.04);
      animation: orbPulse 6s ease-in-out infinite;
    }
    @keyframes orbPulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.08);opacity:1} }

    .rays-svg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; pointer-events:none; }
    .rays-svg svg { width:min(100vw,100vh); height:min(100vw,100vh); opacity:.07; animation:raysSpin 60s linear infinite; }
    @keyframes raysSpin { to{transform:rotate(360deg)} }

    #aff-canvas { position:absolute; inset:0; }

    .corner { position:absolute; width:40px; height:40px; opacity:.25; }
    .corner svg { width:100%; height:100%; }
    .corner.tl{top:1.5rem;left:1.5rem}
    .corner.tr{top:1.5rem;right:1.5rem;transform:scaleX(-1)}
    .corner.bl{bottom:3rem;left:1.5rem;transform:scaleY(-1)}
    .corner.br{bottom:3rem;right:1.5rem;transform:scale(-1)}

    .stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem; text-align: center;
    }
    .eyebrow {
      font-family:'Inter',sans-serif; font-size:clamp(.55rem,1.8vw,.75rem);
      font-weight:300; letter-spacing:.35em; color:rgba(255,255,255,0.7);
      text-transform:uppercase; margin-bottom:2.5rem;
      opacity:0; animation:fadeUp 1.8s ease .3s forwards;
    }
    .divider {
      width:1px; height:48px;
      background:linear-gradient(to bottom,transparent,rgba(100,160,255,.6),transparent);
      margin:0 auto 2.5rem; opacity:0; animation:fadeUp 1.8s ease .5s forwards;
    }
    .affirmation-box { max-width:min(680px,90vw); min-height:8rem; display:flex; align-items:center; justify-content:center; }
    #affirmation {
      font-weight:300; font-style:normal; font-size:clamp(1.4rem,4.5vw,2.4rem);
      font-style:italic; line-height:1.65; color:#ffffff; letter-spacing:.01em; word-break:keep-all; overflow-wrap:break-word; hyphens:none;
      transition:opacity 1.2s ease, transform 1.2s ease;
    }
    #affirmation.fade-out  { opacity:0; transform:translateY(-12px); }
    #affirmation.fade-in   { opacity:1; transform:translateY(0); }
    #affirmation.hidden    { opacity:0; transform:translateY(12px); }
    .divider2 { width:1px; height:48px; background:linear-gradient(to bottom,transparent,rgba(100,160,255,.6),transparent); margin:2.5rem auto 2rem; opacity:0; animation:fadeUp 1.8s ease .7s forwards; }

    .btn-row { display:flex; gap:1rem; align-items:center; opacity:0; animation:fadeUp 1.8s ease 1s forwards; flex-wrap:wrap; justify-content:center; }
    .tap-btn {
      background:none; border:1px solid rgba(255,255,255,.35); color:#ffffff;
      font-family:'Inter',sans-serif; font-size:clamp(.55rem,1.8vw,.72rem); font-weight:300;
      letter-spacing:.3em; text-transform:uppercase; padding:.9rem 2.4rem;
      cursor:pointer; transition:background .4s,border-color .4s,color .4s;
    }
    .tap-btn:hover,.tap-btn:active { background:rgba(255,255,255,.1); border-color:#fff; color:#ffffff; }
    .ar-btn {
      background:none; border:1px solid rgba(255,255,255,.35); color:#ffffff;
      font-family:'Inter',sans-serif; font-size:clamp(.55rem,1.8vw,.72rem); font-weight:300;
      letter-spacing:.2em; text-transform:uppercase; padding:.9rem 1.4rem;
      cursor:pointer; transition:background .4s,border-color .4s,color .4s;
      display:flex; align-items:center; gap:.6rem;
    }
    .ar-btn:hover,.ar-btn:active { background:rgba(255,255,255,.1); border-color:#fff; color:#ffffff; }
    .ar-btn svg { width:18px; height:18px; flex-shrink:0; }

    .footer {
      position:absolute; bottom:env(safe-area-inset-bottom,1.5rem); left:0; right:0;
      text-align:center; font-family:'Inter',sans-serif; font-size:clamp(.45rem,1.4vw,.6rem);
      letter-spacing:.25em; color:rgba(255,255,255,0.3); text-transform:uppercase; padding-bottom:1.2rem;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }

    /* Language selector */
    .lang-wrap {
      position: absolute; top: 1.5rem; right: 1.5rem;
      z-index: 200; font-family: 'Inter', sans-serif;
    }
    .lang-toggle {
      background: rgba(3,8,15,0.75); border: 1px solid rgba(126,184,247,.4);
      color: rgba(255,255,255,.9); font-family: 'Inter', sans-serif;
      font-size: .75rem; font-weight: 500; letter-spacing: .1em;
      padding: .7rem 1.1rem; cursor: pointer;
      display: flex; align-items: center; gap: .5rem;
      backdrop-filter: blur(10px); transition: border-color .3s, color .3s;
      position: relative; z-index: 201;
      min-width: 80px; min-height: 40px;
    }
    .lang-toggle:hover { border-color: rgba(126,184,247,.8); color: #fff; }
    .lang-dropdown {
      position: absolute; top: calc(100% + .4rem); right: 0;
      background: rgba(3,8,20,0.96); border: 1px solid rgba(126,184,247,.3);
      backdrop-filter: blur(16px); min-width: 110px;
      flex-direction: column;
      overflow: hidden; z-index: 202;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .lang-opt {
      background: none; border: none; border-bottom: 1px solid rgba(126,184,247,.1);
      color: rgba(255,255,255,.65); font-family: 'Inter', sans-serif;
      font-size: .72rem; letter-spacing: .08em;
      padding: .6rem 1rem; cursor: pointer; text-align: left;
      transition: background .2s, color .2s; pointer-events: all;
    }
    .lang-opt:last-child { border-bottom: none; }
    .lang-opt:hover { background: rgba(126,184,247,.12); color: #fff; }
    .lang-opt.lang-active { color: #7eb8f7; }

    .sound-fab {
      position: absolute; bottom: 2.8rem; left: 50%; transform: translateX(-50%);
      background: rgba(10,8,6,0.6); border: 1px solid rgba(100,180,255,.35);
      color: rgba(255,255,255,.7); padding: .7rem 1.4rem;
      cursor: pointer; backdrop-filter: blur(8px);
      transition: color .35s, border-color .35s, background .35s;
      display: flex; align-items: center; gap: .6rem;
      white-space: nowrap;
    }
    .sound-fab:hover, .sound-fab:active { color: #ffffff; border-color: #fff; background: rgba(255,255,255,.08); }
    .sound-fab.active { color: #ffffff; border-color: rgba(255,255,255,.6); }
    #sound-label {
      font-family: 'Inter', sans-serif; font-size: .55rem; letter-spacing: .28em;
      text-transform: uppercase;
    }

    /* ══ AR VIEW ══ */
    #view-ar { z-index: 20; background: #000; }

    #ar-video {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    #ar-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
    }
    .ar-frame { position:absolute; inset:0; pointer-events:none; }
    .ar-frame svg { width:100%; height:100%; }

    .ar-ui {
      position: absolute; inset: 0; pointer-events: none;
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 2rem 1.5rem;
      padding-top: max(2rem, env(safe-area-inset-top));
      padding-bottom: max(2rem, env(safe-area-inset-bottom));
    }
    .ar-top { display:flex; justify-content:space-between; align-items:flex-start; }
    .ar-label { font-family:'Inter',sans-serif; font-size:.65rem; letter-spacing:.3em; color:rgba(255,255,255,0.7); text-transform:uppercase; }
    .ar-close-btn {
      pointer-events:all;
      background:rgba(0,0,0,.4); border:1px solid rgba(100,180,255,.4);
      color:#ffffff; font-family:'Inter',sans-serif; font-size:.6rem;
      letter-spacing:.25em; text-transform:uppercase; padding:.6rem 1.2rem;
      cursor:pointer; backdrop-filter:blur(6px); transition:background .3s;
    }
    .ar-close-btn:hover { background:rgba(100,180,255,.15); }
    .ar-bottom { display:flex; flex-direction:column; align-items:center; gap:1.2rem; }
    .ar-hint { font-family:'Inter',sans-serif; font-style:normal; font-size:clamp(.9rem,3vw,1.1rem); color:rgba(255,255,255,0.5); letter-spacing:.05em; text-align:center; }
    .ar-back-btn {
      pointer-events: all;
      background: rgba(0,0,0,.5); border: 1px solid rgba(100,180,255,.5);
      color: #ffffff; font-family:'Inter',sans-serif; font-size:.65rem;
      letter-spacing:.25em; text-transform:uppercase; padding:.8rem 2rem;
      cursor:pointer; backdrop-filter:blur(8px); transition:background .3s, border-color .3s;
      display:flex; align-items:center; gap:.6rem;
    }
    .ar-back-btn:hover,.ar-back-btn:active { background:rgba(255,255,255,.1); border-color:#fff; }

    #ar-permission {
      position:absolute; inset:0; background:rgba(0,0,0,.92);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:1.5rem; padding:2rem; text-align:center; z-index:5;
    }
    #ar-permission.gone { display:none; }
    .perm-icon { opacity:.6; }
    .perm-title { font-family:'Inter',sans-serif; font-size:1rem; letter-spacing:.2em; color:#ffffff; }
    .perm-text { font-size:1rem; color:rgba(255,255,255,0.6); line-height:1.6; max-width:280px; }
    .perm-btn {
      background:none; border:1px solid rgba(255,255,255,.5); color:#ffffff;
      font-family:'Inter',sans-serif; font-size:.65rem; letter-spacing:.3em;
      text-transform:uppercase; padding:.9rem 2.4rem; cursor:pointer; transition:background .3s;
    }
    .perm-btn:hover { background:rgba(100,180,255,.1); }
    .perm-back {
      background:none; border:none; color:rgba(255,255,255,.45);
      font-family:'Inter',sans-serif; font-size:.6rem; letter-spacing:.25em;
      text-transform:uppercase; cursor:pointer; padding:.4rem 1rem;
      transition:color .3s;
    }
    .perm-back:hover { color:#ffffff; }
    .perm-err { color:rgba(255,120,80,.8); font-size:.85rem; display:none; }
  </style>
</head>
<body>

<!-- AFFIRMATION VIEW -->
<div class="view" id="view-affirmation">
  <div class="bg">
    <div class="bg-gradient"></div>
    <div class="warm-glow"></div>
    <div class="bg-noise"></div>
    <div class="orb-wrap"><div class="orb"></div></div>
    <div class="rays-svg"><svg id="rays-svg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg"><g id="rays-g" transform="translate(200,200)"></g></svg></div>
    <canvas id="aff-canvas"></canvas>
  </div>

  <div class="corner tl"><svg viewBox="0 0 40 40" fill="none"><path d="M2 38L2 2L38 2" stroke="#7eb8f7" stroke-width=".8"/><path d="M2 12L12 2" stroke="#7eb8f7" stroke-width=".5" opacity=".5"/></svg></div>

    </div>
  </div>
  <div class="footer">© 2026 &nbsp;Digital Bohemians &nbsp;·&nbsp; All rights reserved</div>
  <button class="sound-fab" id="sound-toggle" onclick="toggleSound()" title="Toggle sound">
    <svg id="sound-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
    </svg>
    <svg id="sound-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" width="22" height="22" style="display:none">
      <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
      <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>
    </svg>
    <span id="sound-label">tap to sound</span>
  </button>
</div>


<!-- AR VIEW -->

  <canvas id="ar-canvas"></canvas>

  <div class="ar-frame">

  <div id="ar-permission">
    <div class="perm-icon">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="rgba(201,168,76,.8)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">

    <p class="perm-text">Allow camera access to see light and energy flowing around the sculpture.</p>
    <button class="perm-btn" onclick="startCamera()">Allow Camera</button>
    <button class="perm-back" onclick="closeAR()">← Back</button>
    <p class="perm-err" id="perm-err">Camera access was denied. Please allow it in your browser settings.</p>

  <div class="ar-ui">
    <div class="ar-top">
      <span class="ar-label">Light Vision</span>

    <div class="ar-bottom">

          <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
        </svg>
        Back to Affirmations
      </button>
    </div>
  </div>
</div>

/* Affirmation bg particles — bidirectional */
(function(){
  const canvas = document.getElementById('aff-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts = [];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  window.addEventListener('resize', resize); resize();

  function mkP(dirOverride){
    const cx=W/2, cy=H*.48, sp=Math.min(W,H)*.28;
    // dir: 1 = up, -1 = down
    const dir = dirOverride !== undefined ? dirOverride : (Math.random() < 0.5 ? 1 : -1);
    return {
      x: cx+(Math.random()-.5)*sp*2,
      y: cy+(Math.random()-.5)*sp,
      r: Math.random()*1.8+.3,
      speed: Math.random()*.45+.08,
      dir: dir,
      alpha: 0,
      maxAlpha: Math.random()*.7+.15,
      life: 0,
      maxLife: Math.random()*320+140,
      dx: (Math.random()-.5)*.25
    };
  }

  // Seed half up, half down
  for(let i=0;i<80;i++){
    const p=mkP(i < 40 ? 1 : -1);
    p.life=Math.random()*p.maxLife;
    pts.push(p);
  }

  function loop(){
    ctx.clearRect(0,0,W,H);
    pts.forEach((p,i)=>{
      p.life++;
      p.x += p.dx;
      p.y -= p.speed * p.dir;  // dir: +1 up, -1 down
      const t=p.life/p.maxLife;
      p.alpha=t<.15?(t/.15)*p.maxAlpha:t>.75?((1-t)/.25)*p.maxAlpha:p.maxAlpha;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(200,220,255,${p.alpha})`; ctx.fill();
      // Out of bounds or life ended — respawn same direction
      if(p.life>=p.maxLife || p.y < -20 || p.y > H+20) pts[i]=mkP(p.dir);
    });
    requestAnimationFrame(loop);
  }
  loop();
})();

  if (audioUnlocked) return;
  audioUnlocked = true;
  if (soundEnabled) {
    audio.play().then(() => {
      document.getElementById('sound-label').textContent = 'sound on';
      document.getElementById('sound-toggle').classList.add('active');
    }).catch(e => console.warn('Audio unlock error:', e));
  }
  document.removeEventListener('touchstart', unlockAudio);
  document.removeEventListener('click', unlockAudio);
}

async function startCamera() {
  document.getElementById('perm-err').style.display = 'none';
  const attempts = [
    { video: { facingMode: { ideal: 'environment' }, width:{ideal:1920}, height:{ideal:1080} }, audio: false },
    { video: { facingMode: 'user' }, audio: false },
    { video: true, audio: false },
  ];
  for (const c of attempts) {
    try {
      arStream = await navigator.mediaDevices.getUserMedia(c);
      const video = document.getElementById('ar-video');
      video.srcObject = arStream;
      await video.play();
      document.getElementById('ar-permission').classList.add('gone');
      initARCanvas();
      return;
    } catch(e) { /* try next */ }
  }
  const err = document.getElementById('perm-err');
  err.textContent = 'Camera access was denied. Please allow it in your browser settings.';
  err.style.display = 'block';
}

function initARCanvas() {
  const canvas = document.getElementById('ar-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
  }
  window.addEventListener('resize', resize); resize();

  const G  = (a) => `rgba(140,195,255,${a})`;
  const WH = (a) => `rgba(200,230,255,${a})`;

  /* ── Floating particles ── */
  const particles = [];
  function mkParticle() {
    const spread = Math.random();
    const x = spread < .7
      ? W*.5 + (Math.random()-.5)*W*.55
      : Math.random()*W;
    const y = spread < .7
      ? H*.55 + (Math.random()-.5)*H*.45
      : Math.random()*H;
    return {
      x, y,
      r: Math.random()*2.2+.4,
      vy: -(Math.random()*.5+.08),
      vx: (Math.random()-.5)*.2,
      life: 0,
      maxLife: Math.random()*440+180,
      maxAlpha: Math.random()*.75+.12,
      alpha: 0,
      star: Math.random() < .22,
      twinkle: Math.random()*Math.PI*2,
    };
  }
  for (let i=0;i<100;i++){const p=mkParticle();p.life=Math.random()*p.maxLife;particles.push(p);}

  /* ── Pulsing rings ── */
  const rings = [];
  function mkRing() {
    return {
      x: W*.3 + Math.random()*W*.4,
      y: H*.25 + Math.random()*H*.45,
      r: 0,
      targetR: Math.random()*Math.min(W,H)*.2 + 28,
      speed: Math.random()*.35+.12,
      alpha: 0,
      phase: 'grow',
      holdT: 0,
      maxHold: Math.random()*90+40,
      thick: Math.random()*1.1+.3,
    };
  }
  for(let i=0;i<7;i++){const r=mkRing();r.r=r.targetR*Math.random()*.9;rings.push(r);}

  /* ── Light streaks ── */
  const streaks = [];
  function mkStreak() {
    const angle = Math.random()*Math.PI*2;
    return {
      cx: W*.28+Math.random()*W*.44,
      cy: H*.22+Math.random()*H*.54,
      angle,
      len: Math.random()*130+35,
      life: 0,
      maxLife: Math.random()*200+70,
      maxAlpha: Math.random()*.5+.08,
      alpha: 0,
      width: Math.random()*1.4+.25,
      drift: (Math.random()-.5)*.003,
    };
  }
  for(let i=0;i<14;i++){const s=mkStreak();s.life=Math.random()*s.maxLife;streaks.push(s);}

  function drawStar(x, y, r, a) {
    ctx.save();
    ctx.globalAlpha = a;
    ctx.strokeStyle = G(1);
    ctx.lineWidth = .5;
    ctx.shadowBlur = 8;
    ctx.shadowColor = G(.6);
    ctx.translate(x, y);
    for(let i=0;i<4;i++){
      ctx.beginPath(); ctx.moveTo(0,-r*1.7); ctx.lineTo(0,r*1.7); ctx.stroke();
      ctx.rotate(Math.PI/4);
    }
    ctx.restore();
  }

  function loop() {
    if (canvas.offsetWidth !== W || canvas.offsetHeight !== H) resize();
    ctx.clearRect(0, 0, W, H);

    /* Rings */
    rings.forEach((rr, i) => {
      if (rr.phase === 'grow') {
        rr.r += rr.speed;
        rr.alpha = Math.min(rr.alpha + .010, .52);
        if (rr.r >= rr.targetR) rr.phase = 'hold';
      } else if (rr.phase === 'hold') {
        rr.holdT++;
        if (rr.holdT >= rr.maxHold) rr.phase = 'fade';
      } else {
        rr.alpha -= .005;
        rr.r += rr.speed * .35;
        if (rr.alpha <= 0) rings[i] = mkRing();
      }
      ctx.save();
      ctx.shadowBlur = 20;
      ctx.shadowColor = G(.35);
      ctx.beginPath();
      ctx.arc(rr.x, rr.y, rr.r, 0, Math.PI*2);
      ctx.strokeStyle = G(rr.alpha);
      ctx.lineWidth = rr.thick * 1.8;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(rr.x, rr.y, rr.r*1.05, 0, Math.PI*2);
      ctx.strokeStyle = WH(rr.alpha * .28);
      ctx.lineWidth = rr.thick * .5;
      ctx.stroke();
      ctx.restore();
    });

    /* Streaks */
    streaks.forEach((s, i) => {
      s.life++; s.angle += s.drift;
      const tt = s.life / s.maxLife;
      s.alpha = tt < .15 ? (tt/.15)*s.maxAlpha
              : tt > .7  ? ((1-tt)/.3)*s.maxAlpha
              : s.maxAlpha;
      const cos=Math.cos(s.angle), sin=Math.sin(s.angle);
      const x1=s.cx-cos*(s.len/2), y1=s.cy-sin*(s.len/2);
      const x2=s.cx+cos*(s.len/2), y2=s.cy+sin*(s.len/2);
      const grad = ctx.createLinearGradient(x1,y1,x2,y2);
      grad.addColorStop(0,   G(0));
      grad.addColorStop(.2,  G(s.alpha));
      grad.addColorStop(.5,  WH(s.alpha*.75));
      grad.addColorStop(.8,  G(s.alpha));
      grad.addColorStop(1,   G(0));
      ctx.save();
      ctx.shadowBlur = 14;
      ctx.shadowColor = G(.4);
      ctx.beginPath();
      ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
      ctx.strokeStyle = grad;
      ctx.lineWidth = s.width*2.2;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.restore();
      if (s.life >= s.maxLife) streaks[i] = mkStreak();
    });

    /* Particles */
    particles.forEach((p, i) => {
      p.life++; p.x+=p.vx; p.y+=p.vy;
      p.twinkle += .035;
      const tr = p.life/p.maxLife;
      p.alpha = tr<.12?(tr/.12)*p.maxAlpha : tr>.78?((1-tr)/.22)*p.maxAlpha : p.maxAlpha;
      const ta = p.alpha * (.7 + .3*Math.sin(p.twinkle));
      if (p.star && p.r > 1.2) {
        drawStar(p.x, p.y, p.r*.7, ta*.85);
      } else {
        ctx.save();
        ctx.shadowBlur = 10;
        ctx.shadowColor = G(.5);
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = G(ta);
        ctx.fill();
        if (p.r > 1.3) {
          ctx.beginPath();
          ctx.arc(p.x-.3, p.y-.3, p.r*.3, 0, Math.PI*2);
          ctx.fillStyle = WH(ta*.55);
          ctx.fill();
        }
        ctx.restore();
      }
      if (p.life >= p.maxLife || p.y < -20) particles[i] = mkParticle();
    });

    arAnimId = requestAnimationFrame(loop);
  }
  loop();
}
</script>
</body>
</html>
